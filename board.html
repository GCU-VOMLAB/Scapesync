<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SCAPESYNC | Board</title>
<meta name="description" content="Updates, notes, and field logs from SCAPESYNC."/>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="assets/scapesync-common.css" rel="stylesheet"/>
<style>
  :root { --nav-h: 80px; }
  html { scroll-behavior: smooth; }
  body {
    min-height: 100vh;
    margin: 0;
    background-color: #0c1324;
    color: #dce1fb;
    font-family: 'JetBrains Mono', monospace;
    overflow-x: hidden;
    background-image:
      radial-gradient(circle at 24% 18%, rgba(0, 240, 255, 0.10), transparent 30%),
      radial-gradient(circle at 78% 72%, rgba(208, 188, 255, 0.08), transparent 32%),
      linear-gradient(rgba(219, 252, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(219, 252, 255, 0.03) 1px, transparent 1px);
    background-size: auto, auto, 32px 32px, 32px 32px;
  }
  .page-hero {
    position: relative;
    z-index: 1;
    min-height: calc(82svh - var(--nav-h));
    display: flex;
    align-items: center;
    padding: calc(var(--nav-h) + 72px) clamp(20px, 5vw, 64px) 72px;
  }
  .page-hero-inner { width: min(1320px, 100%); margin: 0 auto; }
  .page-name {
    display: block;
    width: 100%;
    padding-bottom: clamp(18px, 2vw, 28px);
    border-bottom: 1px solid rgba(0, 240, 255, .48);
    font-family: 'Geist', sans-serif;
    font-size: clamp(72px, 12vw, 176px);
    line-height: .86;
    font-weight: 700;
    color: #dbfcff;
  }
  .page-title {
    margin-top: clamp(28px, 5vw, 64px);
    max-width: 980px;
    font-family: 'Geist', sans-serif;
    font-size: clamp(34px, 4.8vw, 76px);
    line-height: 1.02;
    font-weight: 700;
    color: #dbfcff;
  }
  .page-copy {
    margin-top: 22px;
    max-width: 740px;
    color: #b9cacb;
    font-size: clamp(15px, 1.3vw, 19px);
    line-height: 1.7;
  }
  .content-wrap {
    position: relative;
    z-index: 1;
    width: min(1320px, calc(100% - clamp(40px, 10vw, 128px)));
    margin: 0 auto;
    padding: 24px 0 112px;
  }
  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 28px;
  }
  .filter-btn {
    border: 1px solid rgba(219, 252, 255, .16);
    background: rgba(15, 23, 42, .66);
    color: rgba(219, 252, 255, .68);
    padding: 10px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: .14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color .2s ease, color .2s ease, background .2s ease, box-shadow .2s ease;
  }
  .filter-btn:hover,
  .filter-btn.active {
    border-color: rgba(0, 240, 255, .58);
    color: #00f0ff;
    background: rgba(0, 240, 255, .08);
    box-shadow: inset 0 0 18px rgba(0, 240, 255, .08);
  }
  .board-list { display: grid; gap: 18px; }
  .board-card {
    display: grid;
    grid-template-columns: minmax(120px, .22fr) minmax(0, 1fr) auto;
    gap: 24px;
    align-items: center;
    padding: clamp(22px, 3vw, 34px);
    border: 1px solid rgba(219, 252, 255, .16);
    background: rgba(15, 23, 42, .78);
    backdrop-filter: blur(12px);
  }
  .board-date {
    color: #00f0ff;
    font-size: 12px;
    letter-spacing: .16em;
  }
  .board-card h2 {
    margin: 0;
    font-family: 'Geist', sans-serif;
    font-size: clamp(24px, 3vw, 42px);
    line-height: 1.08;
    color: #dbfcff;
  }
  .board-card p {
    margin: 10px 0 0;
    color: #b9cacb;
    line-height: 1.65;
  }
  .board-tag {
    border: 1px solid rgba(0, 240, 255, .38);
    padding: 9px 12px;
    color: #d3fff6;
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
    background: rgba(0, 240, 255, .07);
  }
  .board-message {
    padding: clamp(22px, 3vw, 34px);
    border: 1px solid rgba(219, 252, 255, .16);
    background: rgba(15, 23, 42, .78);
    color: rgba(219, 252, 255, .7);
  }
  @media (max-width: 760px) {
    .board-card { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="ambient-tile-field" aria-hidden="true"></div>
<nav class="sc-nav">
  <div class="sc-nav-inner">
    <a class="sc-brand" href="index.html#top">SCAPESYNC</a>
    <div class="sc-nav-menu">
      <a class="sc-nav-link" href="index.html#about">ABOUT</a>
      <a class="sc-nav-link" href="index.html#design">DESIGN</a>
      <a class="sc-nav-link" href="index.html#technology">TECHNOLOGY</a>
      <a class="sc-nav-link active" href="board.html">BOARD</a>
      <a class="sc-nav-link" href="contact.html">CONTACT</a>
    </div>
  </div>
</nav>
<main>
  <header class="page-hero">
    <div class="page-hero-inner">
      <span class="page-name">Board</span>
      <h1 class="page-title">Project updates from the shared landscape system.</h1>
      <p class="page-copy">Notes, release signals, and field logs for SCAPESYNC's photomosaic workflow.</p>
    </div>
  </header>
  <section class="content-wrap" aria-label="Board posts">
    <div class="filter-row" aria-label="Board category filters">
      <button class="filter-btn active" type="button" data-filter="all">All</button>
      <button class="filter-btn" type="button" data-filter="notice">Notice</button>
      <button class="filter-btn" type="button" data-filter="news">News</button>
      <button class="filter-btn" type="button" data-filter="award">Award</button>
    </div>
    <div id="board-list" class="board-list"></div>
  </section>
</main>
<footer class="sc-footer">
  <div class="sc-footer-inner">
    <strong class="sc-footer-brand">SCAPESYNC</strong>
    <span>&copy; 2026 SCAPESYNC.</span>
  </div>
</footer>
<script src="assets/scapesync-ambient.js"></script>
<script>
(function () {
  "use strict";

  var CSV_FILE = "board/board_contents.csv";
  var posts = [];
  var activeFilter = "all";
  var list = document.getElementById("board-list");
  var buttons = Array.from(document.querySelectorAll(".filter-btn"));
  var labels = {
    notice: "Notice",
    news: "News",
    award: "Award"
  };

  function escapeHTML(value) {
    return String(value == null ? "" : value).replace(/[&<>"']/g, function (ch) {
      return {"&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"}[ch];
    });
  }

  function parseCSV(text) {
    text = String(text || "").replace(/^\uFEFF/, "").replace(/\u0000/g, "");
    var rows = [];
    var row = [];
    var field = "";
    var quoted = false;

    for (var i = 0; i < text.length; i += 1) {
      var ch = text[i];
      var next = text[i + 1];
      if (quoted) {
        if (ch === '"' && next === '"') {
          field += '"';
          i += 1;
        } else if (ch === '"') {
          quoted = false;
        } else {
          field += ch;
        }
      } else if (ch === '"') {
        quoted = true;
      } else if (ch === ",") {
        row.push(field);
        field = "";
      } else if (ch === "\n") {
        row.push(field);
        rows.push(row);
        row = [];
        field = "";
      } else if (ch !== "\r") {
        field += ch;
      }
    }

    if (field || row.length) {
      row.push(field);
      rows.push(row);
    }

    if (!rows.length) return [];

    var headers = rows.shift().map(function (header) {
      return header.trim().toLowerCase();
    });

    return rows.filter(function (entry) {
      return entry.some(function (value) { return String(value).trim(); });
    }).map(function (entry) {
      var item = {};
      headers.forEach(function (header, index) {
        item[header] = (entry[index] || "").trim();
      });
      return item;
    }).filter(function (item) {
      return item.date && item.cat && item.title;
    });
  }

  function showMessage(message) {
    list.innerHTML = '<div class="board-message">' + escapeHTML(message) + "</div>";
  }

  function render() {
    var visible = posts.filter(function (post) {
      return activeFilter === "all" || post.cat === activeFilter;
    });

    if (!visible.length) {
      showMessage("No posts in this category.");
      return;
    }

    list.innerHTML = visible.map(function (post) {
      var cat = post.cat.toLowerCase();
      return [
        '<article class="board-card" data-cat="' + escapeHTML(cat) + '">',
        '<div class="board-date">' + escapeHTML(post.date) + "</div>",
        "<div>",
        "<h2>" + escapeHTML(post.title) + "</h2>",
        "<p>" + escapeHTML(post.body || post.summary || "") + "</p>",
        "</div>",
        '<span class="board-tag">' + escapeHTML(labels[cat] || cat) + "</span>",
        "</article>"
      ].join("");
    }).join("");
  }

  buttons.forEach(function (button) {
    button.addEventListener("click", function () {
      activeFilter = button.dataset.filter || "all";
      buttons.forEach(function (item) {
        item.classList.toggle("active", item === button);
      });
      render();
    });
  });

  fetch(CSV_FILE, { cache: "no-store" })
    .then(function (response) {
      if (!response.ok) throw new Error("CSV not found");
      return response.text();
    })
    .then(function (text) {
      posts = parseCSV(text);
      if (!posts.length) {
        showMessage("Board contents are empty.");
        return;
      }
      render();
    })
    .catch(function () {
      showMessage("Board contents could not be loaded. Please check board/board_contents.csv.");
    });
})();
</script>
</body>
</html>
