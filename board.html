<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SCAPESYNC | Board</title>
<meta name="description" content="Updates, notes, and field logs from SCAPESYNC."/>

<style>
  :root { --nav-h: 80px; }
  html { scroll-behavior: smooth; }
  body {
    min-height: 100vh;
    margin: 0;
    background-color: #0c1324;
    color: #dce1fb;
    font-family: 'JetBrains Mono', monospace;
    overflow-x: hidden;
    background-image:
      radial-gradient(circle at 24% 18%, rgba(0, 240, 255, 0.10), transparent 30%),
      radial-gradient(circle at 78% 72%, rgba(208, 188, 255, 0.08), transparent 32%),
      linear-gradient(rgba(219, 252, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(219, 252, 255, 0.03) 1px, transparent 1px);
    background-size: auto, auto, 32px 32px, 32px 32px;
  }
  .page-hero {
    position: relative;
    z-index: 1;
    min-height: calc(82svh - var(--nav-h));
    display: flex;
    align-items: center;
    padding: calc(var(--nav-h) + 72px) clamp(20px, 5vw, 64px) 72px;
  }
  .page-hero-inner { width: min(1320px, 100%); margin: 0 auto; }
  .page-name {
    display: block;
    width: 100%;
    padding-bottom: clamp(18px, 2vw, 28px);
    border-bottom: 1px solid rgba(0, 240, 255, .48);
    font-family: 'Geist', sans-serif;
    font-size: clamp(58px, 9vw, 140px);
    line-height: .86;
    font-weight: 700;
    color: #dbfcff;
  }
  .page-title {
    margin-top: clamp(28px, 5vw, 64px);
    max-width: 980px;
    font-family: 'Geist', sans-serif;
    font-size: clamp(34px, 4.8vw, 76px);
    line-height: 1.02;
    font-weight: 700;
    color: #dbfcff;
  }
  .page-copy {
    margin-top: 40px;
    max-width: 800px;
    color: #b9cacb;
    font-size: clamp(15px, 1.3vw, 19px);
    line-height: 1.7;
  }
  .content-wrap {
    position: relative;
    z-index: 1;
    width: min(1320px, calc(100% - clamp(40px, 10vw, 128px)));
    margin: 0 auto;
    padding: 24px 0 112px;
  }
  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 28px;
  }
  .filter-btn {
    border: 1px solid rgba(219, 252, 255, .16);
    background: rgba(15, 23, 42, .66);
    color: rgba(219, 252, 255, .68);
    padding: 10px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: .14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color .2s ease, color .2s ease, background .2s ease, box-shadow .2s ease;
  }
  .filter-btn:hover,
  .filter-btn.active {
    border-color: rgba(0, 240, 255, .58);
    color: #00f0ff;
    background: rgba(0, 240, 255, .08);
    box-shadow: inset 0 0 18px rgba(0, 240, 255, .08);
  }
  .filter-btn[data-filter="notice"].active {
    border-color: rgba(0, 240, 255, .62);
    color: #00f0ff;
    background: rgba(0, 240, 255, .09);
  }
  .filter-btn[data-filter="news"].active {
    border-color: rgba(113, 248, 228, .64);
    color: #71f8e4;
    background: rgba(113, 248, 228, .09);
  }
  .filter-btn[data-filter="award"].active {
    border-color: rgba(208, 188, 255, .68);
    color: #d0bcff;
    background: rgba(208, 188, 255, .10);
  }
  .board-list { display: grid; gap: 18px; }
  .board-card {
    --cat-color: #00f0ff;
    --cat-border: rgba(0, 240, 255, .42);
    --cat-bg: rgba(0, 240, 255, .07);
    display: block;
    overflow: hidden;
    scroll-margin-top: 92px;
    border: 1px solid rgba(219, 252, 255, .16);
    border-left: 4px solid var(--cat-color);
    background: rgba(15, 23, 42, .78);
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .01), 0 18px 60px rgba(0, 0, 0, .16);
  }
  .board-toggle {
    width: 100%;
    padding: clamp(22px, 3vw, 34px);
    border: 0;
    background: transparent;
    color: inherit;
    text-align: left;
    cursor: pointer;
    transition: background .2s ease;
  }
  .board-toggle:hover,
  .board-toggle:focus-visible {
    background: rgba(219, 252, 255, .035);
    outline: none;
  }
  .board-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .board-heading-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
  .board-card[data-cat="notice"] {
    --cat-color: #00f0ff;
    --cat-border: rgba(0, 240, 255, .46);
    --cat-bg: rgba(0, 240, 255, .08);
  }
  .board-card[data-cat="news"] {
    --cat-color: #71f8e4;
    --cat-border: rgba(113, 248, 228, .48);
    --cat-bg: rgba(113, 248, 228, .08);
  }
  .board-card[data-cat="award"] {
    --cat-color: #d0bcff;
    --cat-border: rgba(208, 188, 255, .52);
    --cat-bg: rgba(208, 188, 255, .09);
  }
  .board-date {
    color: var(--cat-color);
    font-size: 20px;
    letter-spacing: .16em;
  }
  .board-card h2 {
    margin: 0;
    font-family: 'Geist', sans-serif;
    font-size: clamp(24px, 3vw, 42px);
    line-height: 1.08;
    color: #dbfcff;
  }
  .board-card p {
    margin: 20px 0 0;
    color: #b9cacb;
    line-height: 1.65;
  }
  .board-main {
    min-width: 0;
    padding: 0 clamp(22px, 3vw, 34px) clamp(26px, 3vw, 36px);
    border-top: 1px solid rgba(219, 252, 255, .1);
  }
  .board-body[hidden] { display: none; }
  .board-card.open .board-main { animation: board-body-in .34s ease both; }
  @keyframes board-body-in {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: none; }
  }
  .board-media {
    margin-top: 20px;
    width: min(100%, 920px);
    overflow: hidden;
    border: 1px solid rgba(219, 252, 255, .18);
    background:
      linear-gradient(rgba(219, 252, 255, .06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(219, 252, 255, .06) 1px, transparent 1px),
      rgba(4, 11, 25, .84);
    background-size: 32px 32px, 32px 32px, auto;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.02), 0 24px 70px rgba(0,0,0,.28);
  }
  .board-media img,
  .board-media video {
    display: block;
    width: 100%;
    height: auto;
    max-height: 68svh;
    object-fit: contain;
    background: #050b16;
  }
  .board-tag {
    display: inline-flex;
    align-items: center;
    border: 1px solid var(--cat-border);
    padding: 5px 10px;
    color: var(--cat-color);
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
    background: var(--cat-bg);
  }
  .board-chevron {
    flex: 0 0 auto;
    width: 13px;
    height: 13px;
    margin-right: 5px;
    border-right: 2px solid var(--cat-color);
    border-bottom: 2px solid var(--cat-color);
    transform: rotate(45deg) translate(-2px, -2px);
    transition: transform .28s ease;
  }
  .board-card.open .board-chevron {
    transform: rotate(225deg) translate(-2px, -2px);
  }
  .board-message {
    padding: clamp(22px, 3vw, 34px);
    border: 1px solid rgba(219, 252, 255, .16);
    background: rgba(15, 23, 42, .78);
    color: rgba(219, 252, 255, .7);
  }
  @media (max-width: 760px) {
    .board-heading-row { align-items: flex-start; gap: 16px; }
    .board-meta { flex-wrap: wrap; }
  }
</style>

<main>
  <header class="page-hero">
    <div class="page-hero-inner">
      <span class="page-name">Board</span>
      <h1 class="page-title">Notices & News</h1>
      <p class="page-copy">Announcements, updates, and milestones from the SCAPESYNC project.</p>
    </div>
  </header>
  <section class="content-wrap" aria-label="Board posts">
    <div class="filter-row" aria-label="Board category filters">
      <button class="filter-btn active" type="button" data-filter="all">All</button>
      <button class="filter-btn" type="button" data-filter="notice">Notice</button>
      <button class="filter-btn" type="button" data-filter="news">News</button>

  </section>
</main>
<footer class="sc-footer">
  <div class="sc-footer-inner">
    <strong class="sc-footer-brand">SCAPESYNC</strong>
    <div class="sc-footer-ack"><div class="sc-footer-ack-row"><span>Supported by IITP &middot; COMPA &middot; Gyeonggi RISE Center</span><a href="https://scapesync.p-e.kr/board.html#acknowledgements">Acknowledgements &rarr;</a></div></div>

<script src="assets/scapesync-ambient.js"></script>
<script>
(function () {
  "use strict";

  var CSV_FILE = "board/board_contents.csv";
  var posts = [];
  var activeFilter = "all";
  var list = document.getElementById("board-list");
  var buttons = Array.from(document.querySelectorAll(".filter-btn"));
  var labels = {
    notice: "Notice",
    news: "News",
    award: "Award"
  };

  function escapeHTML(value) {
    return String(value == null ? "" : value).replace(/[&<>"']/g, function (ch) {
      return {"&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"}[ch];
    });
  }

  function formatBody(value) {
    return escapeHTML(value).replace(/\n/g, "<br>");
  }

  function mediaHTML(path, title) {
    var src = String(path || "").trim();
    if (!src) return "";
    src = src.replace(/\\/g, "/");
    var clean = src.split("?")[0].split("#")[0].toLowerCase();
    var safeSrc = escapeHTML(src);
    var safeTitle = escapeHTML(title || "Board media");
    if (/\.(mp4|webm|ogg|mov)$/.test(clean)) {
      var type = clean.endsWith(".webm") ? "video/webm" : clean.endsWith(".ogg") ? "video/ogg" : "video/mp4";
      return [
        '<figure class="board-media">',
        '<video controls playsinline preload="metadata" aria-label="' + safeTitle + '">',
        '<source src="' + safeSrc + '" type="' + type + '">',
        "</video>",
        "</figure>"
      ].join("");
    }
    if (/\.(png|jpe?g|gif|webp|avif|svg)$/.test(clean)) {
      return '<figure class="board-media"><img src="' + safeSrc + '" alt="' + safeTitle + '" loading="lazy"></figure>';
    }
    return "";
  }

  function parseCSV(text) {
    text = String(text || "").replace(/^\uFEFF/, "").replace(/\u0000/g, "");
    var rows = [];
    var row = [];
    var field = "";
    var quoted = false;

    for (var i = 0; i < text.length; i += 1) {
      var ch = text[i];
      var next = text[i + 1];
      if (quoted) {
        if (ch === '"' && next === '"') {
          field += '"';
          i += 1;
        } else if (ch === '"') {
          quoted = false;
        } else {
          field += ch;
        }
      } else if (ch === '"') {
        quoted = true;
      } else if (ch === ",") {
        row.push(field);
        field = "";
      } else if (ch === "\n") {
        row.push(field);
        rows.push(row);
        row = [];
        field = "";
      } else if (ch !== "\r") {
        field += ch;
      }
    }

    if (field || row.length) {
      row.push(field);
      rows.push(row);
    }

    if (!rows.length) return [];

    var headers = rows.shift().map(function (header) {
      return header.trim().toLowerCase();
    });

    return rows.filter(function (entry) {
      return entry.some(function (value) { return String(value).trim(); });
    }).map(function (entry) {
      var item = {};
      headers.forEach(function (header, index) {
        item[header] = (entry[index] || "").trim();
      });
      return item;
    }).filter(function (item) {
      return item.date && item.cat && item.title;
    });
  }

  function showMessage(message) {
    list.innerHTML = '<div class="board-message">' + escapeHTML(message) + "</div>";
  }

  function render() {
    var visible = posts.filter(function (post) {
      return activeFilter === "all" || post.cat === activeFilter;
    });

    if (!visible.length) {
      showMessage("No posts in this category.");
      return;
    }

    list.innerHTML = visible.map(function (post, index) {
      var cat = post.cat.toLowerCase();
      var slug = String(post.slug || "").trim().replace(/[^a-z0-9_-]/gi, "-");
      var panelId = "board-panel-" + (slug || index);
      return [
        '<article class="board-card" data-cat="' + escapeHTML(cat) + '"' + (slug ? ' id="' + escapeHTML(slug) + '"' : "") + ">",
        '<button class="board-toggle" type="button" aria-expanded="false" aria-controls="' + escapeHTML(panelId) + '">',
        '<span class="board-meta">',
        '<span class="board-date">' + escapeHTML(post.date) + "</span>",
        '<span class="board-tag">' + escapeHTML(labels[cat] || cat) + "</span>",
        "</span>",
        '<span class="board-heading-row">',
        "<h2>" + escapeHTML(post.title) + "</h2>",
        '<span class="board-chevron" aria-hidden="true"></span>',
        "</span>",
        "</button>",
        '<div class="board-body" id="' + escapeHTML(panelId) + '" hidden>',
        '<div class="board-main">',
        "<p>" + formatBody(post.body || post.summary || "") + "</p>",
        mediaHTML(post.media, post.title),
        "</div>",
        "</div>",
        "</article>"
      ].join("");
    }).join("");
    bindToggles();
    openHashPost();
  }

  function setPostOpen(card, open) {
    if (!card) return;
    var toggle = card.querySelector(".board-toggle");
    var body = card.querySelector(".board-body");
    card.classList.toggle("open", open);
    if (toggle) toggle.setAttribute("aria-expanded", open ? "true" : "false");
    if (body) body.hidden = !open;
    if (!open && body) {
      body.querySelectorAll("video").forEach(function (video) { video.pause(); });
    }
  }

  function bindToggles() {
    list.querySelectorAll(".board-toggle").forEach(function (toggle) {
      toggle.addEventListener("click", function () {
        var card = toggle.closest(".board-card");
        setPostOpen(card, toggle.getAttribute("aria-expanded") !== "true");
      });
    });
  }

  function openHashPost() {
    var id = window.location.hash.slice(1);
    if (!id) return;
    var post = document.getElementById(id);
    if (!post) return;
    setPostOpen(post, true);
    window.requestAnimationFrame(function () {
      post.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  }

  buttons.forEach(function (button) {
    button.addEventListener("click", function () {
      activeFilter = button.dataset.filter || "all";
      buttons.forEach(function (item) {
        item.classList.toggle("active", item === button);
      });
      render();
    });
  });

  window.addEventListener("hashchange", openHashPost);

  fetch(CSV_FILE, { cache: "no-store" })
    .then(function (response) {
      if (!response.ok) throw new Error("CSV not found");
      return response.text();
    })
    .then(function (text) {
      posts = parseCSV(text);
      if (!posts.length) {
        showMessage("Board contents are empty.");
        return;
      }
      render();
    })
    .catch(function () {
      showMessage("Board contents could not be loaded. Please check board/board_contents.csv.");
    });
})();
</script>
</body>
