<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SCAPESYNC | Contact</title>
<meta name="description" content="Contact SCAPESYNC for photomosaic landscape and data-driven media projects."/>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="assets/scapesync-common.css" rel="stylesheet"/>
<style>
  :root { --nav-h: 80px; }
  html { scroll-behavior: smooth; }
  body {
    min-height: 100vh;
    margin: 0;
    background-color: #0c1324;
    color: #dce1fb;
    font-family: 'JetBrains Mono', monospace;
    overflow-x: hidden;
    background-image:
      radial-gradient(circle at 22% 24%, rgba(0, 240, 255, 0.10), transparent 32%),
      radial-gradient(circle at 76% 70%, rgba(208, 188, 255, 0.08), transparent 32%),
      linear-gradient(rgba(219, 252, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(219, 252, 255, 0.03) 1px, transparent 1px);
    background-size: auto, auto, 32px 32px, 32px 32px;
  }
  .page-hero {
    position: relative;
    z-index: 1;
    min-height: calc(82svh - var(--nav-h));
    display: flex;
    align-items: center;
    padding: calc(var(--nav-h) + 72px) clamp(20px, 5vw, 64px) 72px;
  }
  .page-hero-inner { width: min(1320px, 100%); margin: 0 auto; }
  .page-name {
    display: block;
    width: 100%;
    padding-bottom: clamp(18px, 2vw, 28px);
    border-bottom: 1px solid rgba(0, 240, 255, .48);
    font-family: 'Geist', sans-serif;
    font-size: clamp(72px, 12vw, 176px);
    line-height: .86;
    font-weight: 700;
    color: #dbfcff;
  }
  .page-title {
    margin-top: clamp(28px, 5vw, 64px);
    max-width: 980px;
    font-family: 'Geist', sans-serif;
    font-size: clamp(34px, 4.8vw, 76px);
    line-height: 1.02;
    font-weight: 700;
    color: #dbfcff;
  }
  .page-copy {
    margin-top: 22px;
    max-width: 760px;
    color: #b9cacb;
    font-size: clamp(15px, 1.3vw, 19px);
    line-height: 1.7;
  }
  .content-wrap {
    position: relative;
    z-index: 1;
    width: min(1320px, calc(100% - clamp(40px, 10vw, 128px)));
    margin: 0 auto;
    padding: 24px 0 112px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }
  .panel {
    border: 1px solid rgba(219, 252, 255, .16);
    background: rgba(15, 23, 42, .78);
    backdrop-filter: blur(12px);
    box-shadow: 0 32px 100px rgba(0, 0, 0, .24);
  }
  .map-panel {
    min-height: clamp(420px, 58vh, 680px);
    overflow: hidden;
  }
  .map-panel iframe {
    display: block;
    width: 100%;
    height: clamp(420px, 58vh, 680px);
    border: 0;
    filter: saturate(.72) contrast(1.06) brightness(.82);
  }
  .contact-form {
    padding: clamp(26px, 4vw, 54px);
    display: grid;
    gap: 22px;
  }
  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 22px;
  }
  label span {
    display: block;
    margin-bottom: 8px;
    color: rgba(211, 255, 246, .68);
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
  }
  input,
  textarea {
    width: 100%;
    border: 1px solid rgba(219, 252, 255, .14);
    background: rgba(7, 13, 31, .88) !important;
    background-color: rgba(7, 13, 31, .88) !important;
    color: #ffffff;
    -webkit-text-fill-color: #ffffff;
    caret-color: #00f0ff;
    appearance: none;
    padding: 15px 16px;
    outline: none;
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .01);
    transition: border-color .2s ease, box-shadow .2s ease;
  }
  input::placeholder,
  textarea::placeholder {
    color: rgba(219, 252, 255, .48);
    -webkit-text-fill-color: rgba(219, 252, 255, .48);
  }
  input:-webkit-autofill,
  textarea:-webkit-autofill {
    -webkit-text-fill-color: #ffffff;
    box-shadow: 0 0 0 1000px rgba(7, 13, 31, .96) inset;
  }
  #contact-form input,
  #contact-form textarea {
    color: #ffffff !important;
    -webkit-text-fill-color: #ffffff;
    background-color: rgba(7, 13, 31, .88) !important;
  }
  input:focus,
  textarea:focus {
    border-color: rgba(0, 240, 255, .58);
    box-shadow: 0 0 0 3px rgba(0, 240, 255, .08);
  }
  button {
    width: 100%;
    min-height: 58px;
    justify-content: center;
    justify-self: stretch;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    border: 1px solid rgba(0, 240, 255, .58);
    background: #dbfcff;
    color: #00363a;
    padding: 16px 24px;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: .14em;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 18px 46px rgba(0, 240, 255, .08);
    transition: transform .2s ease, box-shadow .2s ease, background .2s ease;
  }
  button:hover {
    background: #ffffff;
    box-shadow: 0 20px 58px rgba(0, 240, 255, .16);
    transform: translateY(-1px);
  }
  #form-note {
    min-height: 22px;
    color: rgba(219, 252, 255, .58);
    font-size: 12px;
  }
  @media (max-width: 760px) {
    .form-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body class="antialiased">
<div id="ambient-tile-field" aria-hidden="true"></div>
<nav class="sc-nav">
  <div class="sc-nav-inner">
    <a class="sc-brand" href="index.html#top">SCAPESYNC</a>
    <div class="sc-nav-menu">
      <a class="sc-nav-link" href="index.html#about">ABOUT</a>
      <a class="sc-nav-link" href="index.html#design">DESIGN</a>
      <a class="sc-nav-link" href="index.html#technology">TECHNOLOGY</a>
      <a class="sc-nav-link" href="board.html">BOARD</a>
      <a class="sc-nav-link active" href="contact.html">CONTACT</a>
    </div>
  </div>
</nav>
<main>
  <header class="page-hero">
    <div class="page-hero-inner">
      <span class="page-name">Contact</span>
      <h1 class="page-title">Start a shared landscape from your site data.</h1>
      <p class="page-copy">Use the form for pilot projects, cultural spaces, visitor data experiments, or media environments that can become a collective photomosaic.</p>
    </div>
  </header>
  <section class="content-wrap" aria-label="Contact form and map">
    <div class="panel map-panel">
      <iframe id="contact-map" title="Google map showing Gachon University" loading="lazy" allowfullscreen referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
    <form id="contact-form" class="panel contact-form" novalidate>
      <div class="form-grid">
        <label>
          <span>Name</span>
          <input name="name" type="text" required autocomplete="name"/>
        </label>
        <label>
          <span>Email</span>
          <input name="email" type="email" required autocomplete="email"/>
        </label>
      </div>
      <label>
        <span>Organization</span>
        <input name="org" type="text" autocomplete="organization"/>
      </label>
      <label>
        <span>Project / Message</span>
        <textarea name="message" rows="8" required></textarea>
      </label>
      <button type="submit"><span class="material-symbols-outlined" aria-hidden="true">send</span> Send message</button>
      <p id="form-note" aria-live="polite"></p>
    </form>
  </section>
</main>
<footer class="sc-footer">
  <div class="sc-footer-inner">
    <strong class="sc-footer-brand">SCAPESYNC</strong>
    <span>&copy; 2026 SCAPESYNC.</span>
  </div>
</footer>
<script src="assets/scapesync-ambient.js"></script>
<script>
(function(){
  "use strict";
  var TO = "hello@scapesync.p-e.kr";
  var MAP_ADDRESS = "Gachon University, Seongnam, Republic of Korea";
  var map = document.getElementById("contact-map");
  if (map) {
    map.src = "https://www.google.com/maps?q=" + encodeURIComponent(MAP_ADDRESS) + "&output=embed";
  }
  var form = document.getElementById("contact-form");
  var note = document.getElementById("form-note");
  if (!form || !note) return;
  form.addEventListener("submit", function(event) {
    event.preventDefault();
    var name = form.name.value.trim();
    var email = form.email.value.trim();
    var org = form.org.value.trim() || "-";
    var message = form.message.value.trim();
    if (!name || !email || !message) {
      note.textContent = "Please fill in your name, email, and message.";
      note.style.color = "#ffb4ab";
      return;
    }
    var subject = "SCAPESYNC inquiry - " + name;
    var body = "Name: " + name + "\nEmail: " + email + "\nOrganization: " + org + "\n\n" + message;
    window.location.href = "mailto:" + TO + "?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(body);
    note.textContent = "Opening your email app...";
    note.style.color = "#00f0ff";
  });
})();
</script>
</body>
</html>
